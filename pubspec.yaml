name: crane_task
description: Voice-driven online kanban project management app.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  flutter_gemma: ^0.12.6
  file_picker: ^10.3.8
  http: ^1.2.2
  supabase_flutter: ^2.12.2
  speech_to_text: ^7.3.0
  url_launcher: ^6.3.1
  uuid: ^4.5.3
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_native_splash:
  color: "#ffffff"
  image: "images/CS.png"
  android_12:
    image: "images/CS.png"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/logo_256.png"
  adaptive_icon_background: "#C53627"
  adaptive_icon_foreground: "images/logo_256.png"

flutter:
  uses-material-design: true
  assets:
    - images/logo_256.png
    - images/CS.png
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Thin.ttf
          weight: 100
        - asset: fonts/Roboto-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: fonts/Roboto-ExtraLight.ttf
          weight: 200
        - asset: fonts/Roboto-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: fonts/Roboto-Light.ttf
          weight: 300
        - asset: fonts/Roboto-LightItalic.ttf
          weight: 300
          style: italic
        - asset: fonts/Roboto-Regular.ttf
          weight: 400
        - asset: fonts/Roboto-Italic.ttf
          weight: 400
          style: italic
        - asset: fonts/Roboto-Medium.ttf
          weight: 500
        - asset: fonts/Roboto-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: fonts/Roboto-SemiBold.ttf
          weight: 600
        - asset: fonts/Roboto-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: fonts/Roboto-Bold.ttf
          weight: 700
        - asset: fonts/Roboto-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: fonts/Roboto-ExtraBold.ttf
          weight: 800
        - asset: fonts/Roboto-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: fonts/Roboto-Black.ttf
          weight: 900
        - asset: fonts/Roboto-BlackItalic.ttf
          weight: 900
          style: italic
